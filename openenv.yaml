# openenv.yaml
# Required metadata file — validated by `openenv validate`

name: supply-chain-disruption-dispatcher
version: "1.0.0"
description: >
  A high-fidelity logistics environment where an AI agent acts as a port
  dispatcher rerouting 10–50 shipments after the Port of Seattle closes due
  to a storm. The agent must read unstructured email alerts, respect warehouse
  capacity limits, refrigeration requirements, hazmat rules, and avoid
  strike-affected depots.

author: your-hf-username
tags:
  - openenv
  - logistics
  - supply-chain
  - planning
  - real-world

observation_space:
  type: object
  description: >
    Typed Pydantic Observation model. Includes current step, shipment statuses,
    warehouse utilisation, unread alert counts, fleet status (on request),
    and running reward accumulators.

action_space:
  type: object
  description: >
    Discriminated union over 10 action types: read_inbox, check_warehouse,
    check_shipment, route_shipment, prioritize_shipment, hold_shipment,
    cancel_route, query_fleet, dispatch_truck, no_op.
    All actions require a non-trivial rationale string.

tasks:
  - id: easy
    description: >
      10 shipments, 1 warehouse closed, no special cargo.
      Agent must perform basic rerouting within 40 steps.
    difficulty: easy
    max_steps: 40
    success_threshold: 0.7

  - id: medium
    description: >
      25 shipments, 1 closed warehouse, nearest alternative at 80% capacity.
      Agent must split shipments across multiple destinations within 80 steps.
    difficulty: medium
    max_steps: 80
    success_threshold: 0.6

  - id: hard
    description: >
      50 shipments including 5 refrigerated. Unstructured email alert about
      a union strike at WH_TAC_NORTH. Agent must parse prose alerts and route
      accordingly within 150 steps.
    difficulty: hard
    max_steps: 150
    success_threshold: 0.5

endpoints:
  reset: POST /reset
  step:  POST /step
  state: GET  /state

server:
  framework: fastapi
  port: 7860
  health_check: GET /health

docker:
  base_image: python:3.11-slim
  build_command: docker build -t supply-chain-dispatcher .
  run_command: docker run -p 7860:7860 supply-chain-dispatcher